version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "Starting preBuild at $(date)"
        - npm config set legacy-peer-deps true
        - npm install --legacy-peer-deps
        - echo "Dependencies installed at $(date)"
    build:
      commands:
        - echo "Starting build at $(date)"
        - |
          cat > .env.production.local << EOF
          APP_AWS_ACCESS_KEY_ID=$APP_AWS_ACCESS_KEY_ID
          APP_AWS_SECRET_ACCESS_KEY=$APP_AWS_SECRET_ACCESS_KEY
          DYNAMODB_TABLE_NAME=$DYNAMODB_TABLE_NAME
          S3_BUCKET=$S3_BUCKET
          S3_REGION=$S3_REGION
          AWS_REGION=$AWS_REGION
          EOF
        - echo "Environment file created with credentials"
        - npm run build
        - echo "Build completed at $(date)"
    postBuild:
      commands:
        - echo "Deployment preparation complete at $(date)"
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
